            </div>

              <label class="find-content" for="remember-me"
                ><input type="checkbox" id="remember-me" />
                <p>Remember me</p>
              </label>

              <a class="btn-text" href="#">Forgot password?</a>
            </div>
            <div class="modal-btn-wrap">
              <button class="btn primary btn-login" type="submit">로그인</button>
              <button class="btn light" type="button">취소</button>
            </div>
